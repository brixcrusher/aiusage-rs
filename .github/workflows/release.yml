name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    name: Release ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          tar czf aiusage-rs-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release aiusage-rs
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/aiusage-rs.exe `
            -DestinationPath aiusage-rs-${{ matrix.target }}.zip
      - uses: softprops/action-gh-release@v2
        with:
          files: aiusage-rs-*
          generate_release_notes: true
